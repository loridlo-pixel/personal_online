<style>
:root {
  /* Цвета */
  --primary: #004aad;
  --primary-light: #2f6bff;
  --primary-dark: #002c6a;
  --accent: #00c2ff;
  --text-main: #ffffff;
  --text-muted: #9aa4b2;

  /* Радиусы */
  --radius-sm: 8px;
  --radius-md: 16px;

  /* Отступы */
  --spacing-sm: 12px;
  --spacing-md: 20px;

  /* Тени */
  --shadow-soft: 0 5px 15px rgba(0,0,0,0.1);
}

.site-header {
  width: 100%;
  background: var(--primary-dark);
  color: var(--text-main);
  position: relative;
  z-index: 100;
}

.header-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--spacing-sm) var(--spacing-md);
  position: relative;
  gap: var(--spacing-md);
}

/* Левое меню */
.nav-links {
  display: flex;
  gap: var(--spacing-md);
  list-style: none;
  padding: 0;
  margin: 0;
}
.nav-links li a {
  color: var(--text-main);
  text-decoration: none;
  font-weight: 500;
  transition: var(--transition, 0.3s ease);
}
.nav-links li a:hover {
  color: var(--accent);
}

/* Логотип центрирован по экрану */
.header-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}
.header-center img {
  max-height: 50px;
}

/* Правый блок */
.header-right {
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
}
.contact-info {
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
}
.contact-info a {
  color: var(--text-main);
  text-decoration: none;
}
.order-btn {
  background: var(--accent);
  border: none;
  padding: 10px var(--spacing-md);
  border-radius: var(--radius-md);
  color: var(--text-main);
  cursor: pointer;
  transition: var(--transition, 0.3s ease);
}
.order-btn:hover {
  background: var(--primary-light);
}

/* Бургер */
.burger {
  display: none;
  flex-direction: column;
  gap: 4px;
  background: none;
  border: none;
  cursor: pointer;
}
.burger span {
  display: block;
  width: 25px;
  height: 3px;
  background: var(--text-main);
  border-radius: 2px;
}

/* Мобильное меню */
.mobile-menu {
  display: none;
  background: var(--primary-dark);
  padding: var(--spacing-md);
}
.mobile-menu ul {
  list-style: none;
  padding: 0;
  margin: 0;
}
.mobile-menu ul li a {
  display: block;
  padding: var(--spacing-sm) 0;
  color: var(--text-main);
  text-decoration: none;
}
.mobile-contact {
  margin-top: var(--spacing-sm);
  display: flex;
  flex-direction: column;
  gap: var(--spacing-sm);
}
.mobile-contact .header-phone,
.mobile-contact .messenger,
.mobile-contact .order-btn {
  width: 100%;
  text-align: center;
}

/* === Адаптив === */
@media (max-width: 1024px) {
  .nav-links {
    display: none; /* скрываем меню на планшетах/мобилках */
  }
}

@media (max-width: 768px) {
  .header-right .contact-info,
  .order-btn {
    display: none;
  }
  .burger {
    display: flex;
  }
  .mobile-menu.active {
    display: block;
  }
}
</style>

<script>
// Бургер для мобилки
const burger = document.querySelector('.burger');
const mobileMenu = document.querySelector('.mobile-menu');

burger.addEventListener('click', () => {
  mobileMenu.classList.toggle('active');
});
</script>
