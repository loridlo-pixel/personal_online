<section id="outsourcing-stats" style="background:#ffffff;padding:80px 20px;color:#222;text-align:center;font-family:'Inter',sans-serif;">
  <h2 style="font-size:28px;font-weight:700;margin-bottom:50px;color: #222">Результаты аутсорсинга за 2024 год</h2>

  <div class="stats-grid" style="display:flex;flex-wrap:wrap;justify-content:center;gap:60px;max-width:1000px;margin:0 auto;">

    <!-- 1 -->
    <div class="stat-item" style="text-align:center;">
      <div class="circle-wrap">
        <svg class="progress-ring" width="150" height="150">
          <circle class="progress-ring__circle" stroke="#ff7b00" stroke-width="10" fill="transparent" r="65" cx="75" cy="75" stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:50% 50%;stroke-dasharray:408;stroke-dashoffset:408"/>
        </svg>
        <div class="circle-text">
          <span class="value" data-target="2450">0</span> 
        </div>
      </div>
      <div style="margin-top:20px;font-weight:600;">Компаний перешли<br>на аутсорсинг</div>
    </div>

    <!-- 2 -->
    <div class="stat-item" style="text-align:center;">
      <div class="circle-wrap">
        <svg class="progress-ring" width="150" height="150">
          <circle class="progress-ring__circle" stroke="#ff7b00" stroke-width="10" fill="transparent" r="65" cx="75" cy="75" stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:50% 50%;stroke-dasharray:408;stroke-dashoffset:408"/>
        </svg>
        <div class="circle-text">
          <span class="value" data-target="18700">0</span>
        </div>
      </div>
      <div style="margin-top:20px;font-weight:600;">Работников зарегистрировались<br>в компаниях по аутсорсу</div>
    </div>

    <!-- 3 -->
    <div class="stat-item" style="text-align:center;">
      <div class="circle-wrap">
        <svg class="progress-ring" width="150" height="150">
          <circle class="progress-ring__circle" stroke="#ff7b00" stroke-width="10" fill="transparent" r="65" cx="75" cy="75" stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:50% 50%;stroke-dasharray:408;stroke-dashoffset:408"/>
        </svg>
        <div class="circle-text">
          <span class="value" data-target="52340">0</span>
        </div>
      </div>
      <div style="margin-top:20px;font-weight:600;">Заявок выполнено<br>в рамках контрактов</div>
    </div>

  </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const section = document.querySelector("#outsourcing-stats");
  const circles = document.querySelectorAll(".progress-ring__circle");
  const values = document.querySelectorAll(".value");

  let animated = false;

  function animate() {
    if (animated) return;
    animated = true;

    values.forEach((val, index) => {
      const target = parseInt(val.dataset.target);
      let current = 0;

      const duration = 2500;
      const frameRate = 20;
      const totalFrames = duration / frameRate;
      const step = target / totalFrames;

      const circle = circles[index];
      const radius = 65;
      const circumference = 2 * Math.PI * radius;

      circle.style.strokeDasharray = circumference;
      circle.style.strokeDashoffset = circumference;

      let progress = 0;

      const interval = setInterval(() => {
        current += step;
        progress += circumference / totalFrames;

        if (current >= target) {
          current = target;
          progress = circumference;
          clearInterval(interval);
        }

        val.textContent = Math.floor(current).toLocaleString('ru-RU');
        circle.style.strokeDashoffset = circumference - progress;
      }, frameRate);
    });
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        animate();
        observer.disconnect();
      }
    });
  }, {
    threshold: 0.3
  });

  observer.observe(section);
});
</script>

<style>
.circle-wrap {
  position: relative;
  width: 150px;
  height: 150px;
  margin: 0 auto;
}
.circle-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 22px;
  font-weight: 700;
}
@media (max-width: 700px){
  .stats-grid {
    flex-direction: column;
    align-items: center;
  }
}
</style>
