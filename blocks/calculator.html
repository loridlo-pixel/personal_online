<!-- ================= КАЛЬКУЛЯТОР ================= -->
<!-- === ФИНАЛ: калькулятор + PDF + 3 видимых шага === -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<div id="calc-container">
  <h2>Калькулятор стоимости услуг</h2>

  <form id="calc-form">
    <!-- шаги -->
    <div class="calc-step">
      <div class="calc-field">
        <label>Выберите услугу:</label>
        <select id="service">
          <option value="">-- выберите --</option>
          <option>Погрузочно-разгрузочные работы</option>
          <option>Фасовка и упаковка</option>
          <option>Сортировка и комплектация</option>
          <option>Работы на производстве</option>
        </select>
      </div>
    </div>

    <div class="calc-step">
      <div class="calc-field">
        <label>Количество человек:</label>
        <select id="people">
          <option value="">-- выберите --</option>
          <option value="1-4">1–4 чел.</option>
          <option value="5-10">5–10 чел.</option>
          <option value=">10">Более 10 чел.</option>
        </select>
      </div>
    </div>

    <div class="calc-step">
      <div class="calc-field">
        <label>Количество часов:</label>
        <select id="hours">
          <option value="">-- выберите --</option>
          <option value="4">4</option>
          <option value="6">6</option>
          <option value="8">8</option>
          <option value="11">11</option>
        </select>
      </div>
    </div>

    <div class="calc-step">
      <div class="calc-field">
        <label>Тип смены:</label>
        <select id="shift">
          <option value="day">Дневные</option>
          <option value="night">Ночные</option>
          <option value="both">Дневные и ночные</option>
          <option value="other">Другое</option>
        </select>
      </div>
    </div>

    <div class="calc-step">
      <div class="calc-field">
        <label>Место работы:</label>
        <select id="place">
          <option value="production">Производство</option>
          <option value="warehouse-warm">Склад (тёплый)</option>
          <option value="warehouse-cold">Склад (холодный)</option>
        </select>
      </div>
    </div>

    <div class="calc-step">
      <div class="calc-field">
        <label>ТСД используется:</label>
        <select id="tsd">
          <option value="no">Нет</option>
          <option value="yes">Да</option>
        </select>
      </div>
    </div>

    <div class="calc-step">
      <div class="calc-field">
        <label>Медкнижка:</label>
        <select id="med">
          <option value="no">Нет</option>
          <option value="yes">Да</option>
        </select>
      </div>
    </div>

    <div class="calc-step">
      <div class="calc-field">
        <label>Спецодежда:</label>
        <select id="uniform">
          <option value="company">Предоставляем мы</option>
          <option value="own">Своя</option>
          <option value="notneeded">Не требуется</option>
        </select>
      </div>
    </div>

    <div class="calc-step">
      <div class="calc-field">
        <label>Продукция хрупкая:</label>
        <select id="fragile">
          <option value="no">Нет</option>
          <option value="yes">Да</option>
        </select>
      </div>
    </div>

    <div class="calc-step">
      <div class="calc-field">
        <label>Проверка службой безопасности:</label>
        <select id="security">
          <option value="no">Нет</option>
          <option value="yes">Да</option>
        </select>
      </div>
    </div>

    <div class="calc-step">
      <div class="calc-field">
        <label>Период сотрудничества:</label>
        <select id="period">
          <option value="">-- выберите --</option>
          <option value="once">Разовый заказ *</option>
          <option value="1m">1 месяц</option>
          <option value="6m">6 месяцев</option>
          <option value="1y">1 год</option>
          <option value="more">Более года</option>
        </select>
      </div>
    </div>

    <div class="calc-step">
      <div class="calc-field">
        <label>Высокая нагрузка:</label>
        <select id="load">
          <option value="no">Нет</option>
          <option value="yes">Да</option>
        </select>
      </div>
    </div>

    <div class="calc-step">
      <div class="calc-field">
        <label>НДС:</label>
        <select id="nds">
          <option value="0">Без НДС</option>
          <option value="5">5%</option>
          <option value="7">7%</option>
          <option value="10">10%</option>
          <option value="22">22%</option>
        </select>
      </div>
    </div>

    <div class="calc-step">
      <div class="calc-field">
        <label>Имя:</label>
        <input id="name" type="text" placeholder="Ваше имя" />
      </div>
      <div class="calc-field">
        <label>Название компании:</label>
        <input id="company" type="text" placeholder="ООО «Пример»" />
      </div>
      <div class="calc-field">
        <label>Телефон:</label>
        <input id="phone" type="tel" placeholder="+7 (___) ___-__-__" />
      </div>
      <div class="calc-field">
        <label>Электронная почта:</label>
        <input id="email" type="email" placeholder="example@mail.ru" />
      </div>

      <div class="calc-btn-wrapper">
        <button id="calc-btn" type="button">Рассчитать стоимость</button>
      </div>
    </div>

    <!-- навигация -->
    <div class="calc-nav">
      <button type="button" id="prevBtn">Назад</button>
      <button type="button" id="nextBtn">Далее</button>
    </div>
  </form>

  <div id="result">
    <h3>Предварительный расчёт:</h3>
    <div id="animated-price">0 ₽/час</div>
    <div id="report"></div>
    <button id="pdf-btn">Скачать расчёт (PDF)</button>
  </div>

  <p class="note">* Расчёт предварительный и не является офертой.</p>
</div>

<style>
:root {
  --primary-color: #004aad;
  --secondary-color: #ffffff;
  --accent-color: #00aaff;
  --background-color: #f7f9ff;
  --field-background: rgba(255,255,255,0.9);
  --field-border: #ccc;
  --text-color: #222;
  --shadow-color: rgba(0,0,0,0.1);
  --font-family: 'Inter', sans-serif;
  --btn-radius: 12px;
  --btn-padding: 14px 40px;
  --step-transition: 0.35s ease;
}

#calc-container {
  max-width:1100px;
  margin:0 auto;
  padding:40px;
  background: var(--secondary-color);
  border-radius:20px;
  box-shadow:0 10px 30px var(--shadow-color);
  font-family: var(--font-family);
  position: relative;
}

#calc-container h2 {
  text-align:center;
  color: var(--primary-color);
  margin-bottom:20px;
}

.calc-field { 
  margin-bottom:15px; 
  background: var(--field-background);
}
label { 
  display:block; 
  font-weight:600; 
  margin-bottom:6px; 
  color: var(--text-color); 
}
select, input { 
  width:100%; 
  padding:10px; 
  border:1px solid var(--field-border); 
  border-radius:8px; 
  font-size:15px; 
}
.calc-step { 
  display:none; 
  transition: transform var(--step-transition), opacity var(--step-transition); 
  margin-bottom:14px; 
}
.calc-step.visible { 
  display:block; 
  opacity:1; 
  transform:translateY(0); 
}
.calc-step.filled { 
  opacity:0.65; 
  transform:translateY(-6px); 
}
.calc-step.active { 
  opacity:1; 
  transform:translateY(0); 
}

.calc-btn-wrapper {
  text-align:center;
}
#calc-btn {
  background: var(--primary-color);
  color: var(--secondary-color);
  border:none;
  padding: var(--btn-padding);
  font-size:18px;
  border-radius: var(--btn-radius);
  cursor:pointer;
  width:100%;
  max-width:460px;
}

.calc-nav {
  margin-top:30px;
  display:flex;
  justify-content:space-between;
}
.calc-nav button {
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
  border:none;
}
#prevBtn { background:#ccc; color:#222; }
#nextBtn { background: var(--primary-color); color: var(--secondary-color); }

#result {
  display:none;
  text-align:center;
  margin-top:30px;
  background: var(--background-color);
  padding:25px;
  border-radius:16px;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  animation:fadeIn 0.4s ease;
}
#animated-price {
  font-size:36px;
  font-weight:700;
  color: var(--primary-color);
}
#report { text-align:left; margin-top:20px; font-size:15px; line-height:1.6; color:#222; }
#pdf-btn {
  margin-top:25px;
  background: var(--primary-color);
  color: var(--secondary-color);
  border:none;
  padding:12px 30px;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
}
.note { text-align:center; margin-top:20px; font-size:13px; color:#555; }

@keyframes fadeIn { 
  from {opacity:0; transform:translateY(10px);} 
  to {opacity:1; transform:translateY(0);} 
}

@media(max-width:600px){
  #calc-container {padding:20px;} 
  #calc-btn {width:100%; max-width:none;} 
}
</style>

<!-- === Скрытый PDF шаблон === -->
<div id="pdf-template" aria-hidden="true">
  <div class="pdf-header">
    <img class="pdf-logo" id="pdf-logo" src="data:image/png;base64,iVBOR..." alt="logo">
    <div class="pdf-title">Персонал Онлайн — предварительный расчет стоимости часа</div>
  </div>
  <div class="pdf-body" id="pdf-body"></div>
  <div class="pdf-foot">Расчёт предварительный, не является офертой.</div>
</div>
