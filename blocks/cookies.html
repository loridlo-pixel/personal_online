<!-- ================= COOKIE ================= -->
<div class="cookie-banner" id="cookieBanner">
  <button class="cookie-btn" id="cookieOk">ОК</button>
  <div class="cookie-text">
    Наш сайт использует файлы cookie для повышения удобства использования, улучшения работы сайта и анализа его посещаемости. 
    Нажимая кнопку вы даёте согласие на обработку своих персональных данных.<br>
    <a href="/personal" target="_blank" class="cookie-link">Политика в отношении обработки персональных данных</a>
  </div>
</div>

<style>
.cookie-banner {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: var(--bg-dark);
  color: var(--text-main);
  font-family: var(--font-main);
  display: none;
  justify-content: space-between;
  align-items: center;
  gap: var(--spacing-sm);
  padding: var(--spacing-md) var(--spacing-lg);
  z-index: 9999;
  flex-wrap: wrap;
  box-shadow: var(--shadow-card);
}

.cookie-text {
  flex: 1 1 70%;
  font-size: var(--fs-small);
  line-height: 1.5;
}

.cookie-link {
  color: var(--accent);
  text-decoration: underline;
  font-weight: 500;
  transition: color 0.3s ease;
}

.cookie-link:hover {
  color: var(--accent-light);
  text-decoration: none;
}

.cookie-btn {
  background: var(--primary);
  border: none;
  color: var(--text-light);
  font-weight: 600;
  font-size: var(--fs-small);
  padding: 10px 22px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: var(--shadow-card);
}

.cookie-btn:hover {
  background: var(--primary-light);
}

@media (max-width: 768px) {
  .cookie-banner {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }
  .cookie-btn {
    order: -1;
  }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const banner = document.getElementById("cookieBanner");
  const okBtn = document.getElementById("cookieOk");

  // Показываем баннер, если cookie ещё не приняты
  if (!localStorage.getItem("cookieAccepted")) {
    banner.style.display = "flex";
  }

  okBtn.addEventListener("click", async function() {
    // Сохраняем согласие
    localStorage.setItem("cookieAccepted", "true");
    banner.style.display = "none";

    // Сбор данных для документа
    const ipData = await fetch('https://ipapi.co/json/').then(res => res.json()).catch(()=>({ip:'unknown'}));
    const userAgent = navigator.userAgent;
    const date = new Date().toLocaleString('ru-RU');

    const docContent = `
Согласие на обработку персональных данных

Дата/время: ${date}
IP: ${ipData.ip || 'неизвестно'}
Город: ${ipData.city || 'неизвестно'}
Страна: ${ipData.country_name || 'неизвестно'}
Браузер: ${userAgent}

Подтверждаю согласие на обработку моих персональных данных.
`;

    // Генерируем файл и предлагаем скачать
    const blob = new Blob([docContent], {type: 'text/plain'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `consent_${Date.now()}.txt`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  });
});
</script>
